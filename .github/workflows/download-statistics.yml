name: Hourly Download Statistics

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hourly-download-statistics
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      CF_ANALYTICS_API_TOKEN: ${{ secrets.CF_ANALYTICS_API_TOKEN }}
      CF_ZONE_ID: ${{ vars.CF_ZONE_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_PUBLIC_HOST: dl.aloongplanet.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify configuration
        shell: bash
        run: |
          set -euo pipefail
          for name in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY CF_ANALYTICS_API_TOKEN CF_ZONE_ID R2_BUCKET R2_ENDPOINT; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required GitHub Secret or Variable: ${name}"
              exit 1
            fi
          done

      - name: Download state and inventory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/download-statistics"
          aws s3api list-objects-v2 \
            --bucket "$R2_BUCKET" \
            --prefix releases/ \
            --endpoint-url "$R2_ENDPOINT" \
            --output json > "$RUNNER_TEMP/download-statistics/inventory.json"
          if aws s3api head-object \
            --bucket "$R2_BUCKET" \
            --key stats/downloads.json \
            --endpoint-url "$R2_ENDPOINT" > /dev/null 2>&1; then
            aws s3 cp "s3://${R2_BUCKET}/stats/downloads.json" \
              "$RUNNER_TEMP/download-statistics/previous.json" \
              --endpoint-url "$R2_ENDPOINT"
          fi

      - name: Collect download statistics
        run: |
          node build/collect-download-statistics.cjs \
            "$RUNNER_TEMP/download-statistics/previous.json" \
            "$RUNNER_TEMP/download-statistics/inventory.json" \
            "$RUNNER_TEMP/download-statistics/downloads.json"

      - name: Publish state
        shell: bash
        run: |
          set -euo pipefail
          aws s3 cp "$RUNNER_TEMP/download-statistics/downloads.json" \
            "s3://${R2_BUCKET}/stats/downloads.json" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/json \
            --cache-control "public, max-age=300"
