name: Build & Release (Windows + macOS)

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write        # 发布 Release 需要写权限
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm 必须在 setup-node 之前:setup-node 的 cache: 'pnpm' 步骤
      # 会调用 pnpm 探测 store 路径,此时 pnpm 必须已在 PATH 中。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # 不填 version:自动读取 package.json 的 packageManager 字段 (pnpm@9.12.3)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (electron-vite) and package Windows NSIS installer
        run: pnpm run dist:win
        env:
          # 明确不签名:NSIS 会对 setup/uninstaller/elevate 调 signtool,runner 无证书时会失败。
          # 清空证书变量 + 配置里 signAndEditExecutable:false 双保险跳过签名。
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ''
          WIN_CSC_LINK: ''

      # 匹配安装版(-setup.exe)与免安装版(-portable.exe);排除 win-unpacked 里的中间件 exe
      - name: Upload win exe (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Transfer-windows
          path: |
            release/*/*-setup.exe
            release/*/*-portable.exe
          if-no-files-found: error
          retention-days: 7

      # tag 触发时,直接在 GitHub 服务器上把 exe 发布成 Release —— 免去本地下载
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*/*-setup.exe
            release/*/*-portable.exe
          fail_on_unmatched_files: true
          # 预发布 tag(-beta/-rc/-alpha/-dev)标 Pre-release;干净 tag = 正式版(Latest)
          prerelease: ${{ endsWith(github.ref, '-beta') || endsWith(github.ref, '-rc') || endsWith(github.ref, '-alpha') || endsWith(github.ref, '-dev') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest     # dmg 必须在 macOS runner 上打;macos-latest 现为 Apple Silicon(arm64)
    permissions:
      contents: write
    env:
      # 把 secret 提升到 job env,供下面 step 的 if 条件判断(比在 if 里直接读 secrets 更稳、跨版本都支持)。
      HAS_CSC: ${{ secrets.CSC_LINK != '' }}                              # 有签名证书
      HAS_APPLE: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}  # 三项公证凭据齐全
      # 预发布(迭代版):tag 以 -beta/-rc/-alpha/-dev 结尾 → 只签名不公证。干净 tag = 正式版 → 公证。
      IS_PRERELEASE: ${{ endsWith(github.ref, '-beta') || endsWith(github.ref, '-rc') || endsWith(github.ref, '-alpha') || endsWith(github.ref, '-dev') }}
      IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/') && !(endsWith(github.ref, '-beta') || endsWith(github.ref, '-rc') || endsWith(github.ref, '-alpha') || endsWith(github.ref, '-dev')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # mac 打包分三档互斥(见 docs/mac-signing.md):
      #  ① 预发布/手动运行且无证书:生成未签名 artifact；正式版禁止进入此路径。
      #  ② 预发布/手动运行且有证书:只签名，不公证。
      #  ③ 正式版:凭据必须齐全；签名 App → 生成 DMG → 公证/staple/验证最终 DMG。
      #     任一步失败都不上传；正式版不允许降级为仅签名或未签名。

      # ③ 正式版:先验证凭据，再生成并公证最终 DMG。
      - name: Verify formal macOS release credentials
        if: env.IS_RELEASE == 'true'
        run: |
          if [[ "$HAS_CSC" != "true" || "$HAS_APPLE" != "true" ]]; then
            echo "::error::正式版 macOS 发布缺少 Developer ID 证书或 Apple 公证凭据(APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID)"
            exit 1
          fi

      - name: Package formal macOS dmgs (signed)
        if: env.IS_RELEASE == 'true'
        run: pnpm run dist:mac:package-signed
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      # ② 预发布/手动运行:有证书则只签名。
      - name: Package macOS dmg (signed only)
        if: env.IS_RELEASE != 'true' && env.HAS_CSC == 'true'
        run: pnpm run dist:mac
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      # ① 预发布/手动运行:无证书时保留未签名 artifact。
      - name: Package macOS dmg (unsigned, no cert secret)
        if: env.IS_RELEASE != 'true' && env.HAS_CSC != 'true'
        run: pnpm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Notarize and validate macOS dmgs
        if: env.IS_RELEASE == 'true'
        run: pnpm run notarize:mac:dmgs
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload dmg (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Transfer-macos-dmg
          path: release/*/*.dmg
          if-no-files-found: error
          retention-days: 7

      # 与 build-win 发到同一个 tag 的 Release(action-gh-release 对同 tag 是 upsert,追加文件)
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*/*.dmg
          fail_on_unmatched_files: true
          prerelease: ${{ endsWith(github.ref, '-beta') || endsWith(github.ref, '-rc') || endsWith(github.ref, '-alpha') || endsWith(github.ref, '-dev') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # 汇总同步 job:两平台产物都齐后,统一
  #   ① 推所有安装包 → Cloudflare R2(全球下载源)
  #   ② 生成 latest.json 并上传 R2(落地页读它拿最新版本/文件清单)
  # 仅干净正式版 tag 运行；预发布只停留在 GitHub Release，不生成/覆盖 R2 latest.json。
  # 各平台的 GitHub Release 已在上面各 job 发好,本 job 失败不影响它。
  # ─────────────────────────────────────────────────────────────────────────
  sync:
    needs: [build-win, build-mac]
    if: startsWith(github.ref, 'refs/tags/') && !(endsWith(github.ref, '-beta') || endsWith(github.ref, '-rc') || endsWith(github.ref, '-alpha') || endsWith(github.ref, '-dev'))
    runs-on: ubuntu-latest
    env:
      # 提升到 job env 供 step 的 if 判断(与 mac job 同款写法,跨版本稳)
      HAS_R2: ${{ secrets.R2_ACCOUNT_ID != '' && secrets.R2_ACCESS_KEY_ID != '' && secrets.R2_SECRET_ACCESS_KEY != '' && secrets.R2_BUCKET != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 从 tag 去掉 v 前缀得到纯版本号(vX.Y.Z → X.Y.Z),供脚本与 R2 路径用
      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # 下载两平台已上传的 artifact 到 dist/(build-win / build-mac 里 upload-artifact 的产物)
      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Transfer-windows
          path: dist/win
      - name: Download macos artifact
        uses: actions/download-artifact@v4
        with:
          name: Transfer-macos-dmg
          path: dist/mac

      - name: List downloaded artifacts
        run: find dist -type f \( -name '*.dmg' -o -name '*.exe' \) | sort

      # ① 生成 latest.json(纯 Node,无外部依赖)
      - name: Generate latest.json
        env:
          RELEASE_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: node build/gen-latest-json.cjs "${{ steps.ver.outputs.version }}" dist dist/latest.json

      # ② 推 R2:所有安装包 → releases/vX.Y.Z/,latest.json → 根(覆盖)。用 aws-cli(S3 兼容)。
      - name: Upload to Cloudflare R2
        if: env.HAS_R2 == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # 安装包:按版本目录,长缓存(内容不可变)
          find dist -type f \( -name '*.dmg' -o -name '*-win-setup.exe' -o -name '*-win-portable.exe' \) -print0 \
          | while IFS= read -r -d '' f; do
              name=$(basename "$f")
              aws s3 cp "$f" "s3://${R2_BUCKET}/releases/v${VERSION}/${name}" \
                --endpoint-url "$R2_ENDPOINT" \
                --cache-control "public, max-age=31536000, immutable"
            done
          # latest.json:放根,短缓存(要能快速反映新版本)
          aws s3 cp dist/latest.json "s3://${R2_BUCKET}/latest.json" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/json \
            --cache-control "public, max-age=300"

      - name: Summary
        run: |
          echo "R2 上传: ${{ env.HAS_R2 == 'true' && '已执行' || '跳过(缺 secret)' }}"
