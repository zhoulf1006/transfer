name: Build & Release (Windows + macOS)

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write        # 发布 Release 需要写权限
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm 必须在 setup-node 之前:setup-node 的 cache: 'pnpm' 步骤
      # 会调用 pnpm 探测 store 路径,此时 pnpm 必须已在 PATH 中。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # 不填 version:自动读取 package.json 的 packageManager 字段 (pnpm@9.12.3)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (electron-vite) and package Windows NSIS installer
        run: pnpm run dist:win
        env:
          # 明确不签名:NSIS 会对 setup/uninstaller/elevate 调 signtool,runner 无证书时会失败。
          # 清空证书变量 + 配置里 signAndEditExecutable:false 双保险跳过签名。
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ''
          WIN_CSC_LINK: ''

      # 匹配安装版(-setup.exe)与免安装版(-portable.exe);排除 win-unpacked 里的中间件 exe
      - name: Upload win exe (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Transfer-windows
          path: |
            release/*/*-setup.exe
            release/*/*-portable.exe
          if-no-files-found: error
          retention-days: 7

      # tag 触发时,直接在 GitHub 服务器上把 exe 发布成 Release —— 免去本地下载
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*/*-setup.exe
            release/*/*-portable.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest     # dmg 必须在 macOS runner 上打;macos-latest 现为 Apple Silicon(arm64)
    permissions:
      contents: write
    env:
      # 把 secret 提升到 job env,供下面 step 的 if 条件判断(比在 if 里直接读 secrets 更稳、跨版本都支持)。
      HAS_CSC: ${{ secrets.CSC_LINK != '' }}                              # 有签名证书
      HAS_APPLE: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}  # 有公证凭据
      IS_RELEASE: ${{ endsWith(github.ref, '-release') }}                # tag 名以 -release 结尾 → 要公证
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # mac 打包分三档互斥(见 docs/mac-signing.md):
      #  ① 未签名:无签名证书 secret(fork PR/未建)→ 跳过签名(空 CSC_LINK="" 会被当空路径证书→失败,故这里不设它)。
      #  ② 只签名:有证书 + 普通 tag → 已签名未公证(用户右键打开)。
      #  ③ 签名+公证:有证书+Apple 凭据 + tag 名带 -release → 公证(用户双击即开,dist:mac:sign 开 notarize)。
      #     公证耗时不可控(2–30min),故只在 -release tag 才做。

      # ③ 签名 + 公证(-release tag,且有全部凭据)
      - name: Package macOS dmg (signed + notarized)
        if: env.HAS_CSC == 'true' && env.HAS_APPLE == 'true' && env.IS_RELEASE == 'true'
        run: pnpm run dist:mac:sign
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # ② 只签名(有证书,但普通 tag 或缺 Apple 凭据)
      - name: Package macOS dmg (signed only)
        if: env.HAS_CSC == 'true' && !(env.HAS_APPLE == 'true' && env.IS_RELEASE == 'true')
        run: pnpm run dist:mac
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      # ① 未签名(无证书 secret)
      - name: Package macOS dmg (unsigned, no cert secret)
        if: env.HAS_CSC != 'true'
        run: pnpm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload dmg (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Transfer-macos-dmg
          path: release/*/*.dmg
          if-no-files-found: error
          retention-days: 7

      # 与 build-win 发到同一个 tag 的 Release(action-gh-release 对同 tag 是 upsert,追加文件)
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*/*.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
