name: Build & Release (Windows + macOS)

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write        # 发布 Release 需要写权限
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm 必须在 setup-node 之前:setup-node 的 cache: 'pnpm' 步骤
      # 会调用 pnpm 探测 store 路径,此时 pnpm 必须已在 PATH 中。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # 不填 version:自动读取 package.json 的 packageManager 字段 (pnpm@9.12.3)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (electron-vite) and package Windows NSIS installer
        run: pnpm run dist:win
        env:
          # 明确不签名:NSIS 会对 setup/uninstaller/elevate 调 signtool,runner 无证书时会失败。
          # 清空证书变量 + 配置里 signAndEditExecutable:false 双保险跳过签名。
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ''
          WIN_CSC_LINK: ''

      # 匹配安装版(-setup.exe)与免安装版(-portable.exe);排除 win-unpacked 里的中间件 exe
      - name: Upload win exe (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Transfer-windows
          path: |
            release/*/*-setup.exe
            release/*/*-portable.exe
          if-no-files-found: error
          retention-days: 7

      # tag 触发时,直接在 GitHub 服务器上把 exe 发布成 Release —— 免去本地下载
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*/*-setup.exe
            release/*/*-portable.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest     # dmg 必须在 macOS runner 上打;macos-latest 现为 Apple Silicon(arm64)
    permissions:
      contents: write
    env:
      # 把 secret 提升到 job env,供下面 step 的 if 条件判断(比在 if 里直接读 secrets 更稳、跨版本都支持)。
      HAS_CSC: ${{ secrets.CSC_LINK != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # CI 签名(不公证):electron-builder 用 CSC_LINK(base64 .p12)+ CSC_KEY_PASSWORD
      # 自动导入证书到临时钥匙串并签名。不公证(见 docs/mac-signing.md)。
      # ⚠️ 分两个互斥 step:空 CSC_LINK="" 会被当成"空路径证书"→ 构建失败(实测),
      # 故 secret 缺失(fork PR/未建 secret)时走"跳过签名"那个 step,根本不设 CSC_LINK。
      - name: Package macOS dmg (signed)
        if: env.HAS_CSC == 'true'
        run: pnpm run dist:mac
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Package macOS dmg (unsigned, no cert secret)
        if: env.HAS_CSC != 'true'
        run: pnpm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload dmg (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Transfer-macos-dmg
          path: release/*/*.dmg
          if-no-files-found: error
          retention-days: 7

      # 与 build-win 发到同一个 tag 的 Release(action-gh-release 对同 tag 是 upsert,追加文件)
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*/*.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
