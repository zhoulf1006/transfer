<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <title>Transfer</title>
    <style>
      /* 启动屏:窗口一显示即可见(纯 HTML/CSS,不等 JS),React 挂载到 #root 后被替换。
         底色跟随系统深浅,与 theme.css 一致,不露白。 */
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #f7f8f9;
        color: #1a1c1f;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        #splash {
          background: #18191b;
          color: #e9eaed;
        }
      }
      #splash .name {
        font-size: 18px;
        font-weight: 640;
        letter-spacing: -0.01em;
      }
      #splash .ring {
        width: 26px;
        height: 26px;
        border: 3px solid rgba(45, 132, 196, 0.25);
        border-top-color: #2d84c4;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash">
        <div class="name">Transfer</div>
        <div class="ring"></div>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
