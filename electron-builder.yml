appId: com.loong.transfer
productName: Transfer

directories:
  output: release/${version}
  buildResources: build

# electron-vite 输出到 out/;fastify 等 dependencies 由 builder 从 node_modules 收集
files:
  - out
  - package.json
asarUnpack:
  - '**/node_modules/fastify/**'

# 局域网直连需要网络权限;无签名(测试用,朋友端会有一次性安全提示)
win:
  target:
    - target: nsis            # 安装版:装到固定目录,标准向导(可选目录+快捷方式)
      arch: [x64]
    - target: portable        # 免安装版:双击即用(每次解压到临时目录,冷启动略慢)
      arch: [x64]
  # 明确不签名:CI runner 无证书时 signtool 仍被调用会失败。用 signExecutable(不是
  # signAndEditExecutable——后者只管主 exe,漏了 NSIS 的 setup/uninstaller)。
  # signExecutable:false 在读证书前短路,对主exe/setup/uninstaller/elevate 全生效,且保留图标元数据。
  signExecutable: false
  icon: build/icon.ico         # 应用图标(紫底 + 白色纸飞机,主色 #8a67ab)

# portable 产物名(与 nsis 的 -setup.exe 区分)
portable:
  artifactName: ${productName}-${version}-portable.exe

# NSIS:标准安装向导 —— 用户能看到/选择安装目录、勾快捷方式(不再静默装到隐藏目录)
nsis:
  oneClick: false                        # 弹安装向导,不静默
  perMachine: false                      # 默认当前用户目录(无需管理员;向导里仍可改)
  allowToChangeInstallationDirectory: true # 允许用户选择安装目录
  createDesktopShortcut: true            # 创建桌面快捷方式
  createStartMenuShortcut: true          # 创建开始菜单快捷方式
  artifactName: ${productName}-${version}-setup.exe

mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      # 三个产物,用户按机器自选(见 docs/electron-slimming.md):
      #   universal 保底(不确定架构就下它,Intel+Apple 芯片通吃,单包 ~410MB)
      #   arm64     Apple 芯片专用(M 系列,~230MB,最小)
      #   x64       Intel 芯片专用(~230MB)
      # ${arch} 在 dmg 上解析为字面 universal/arm64/x64(x64 不变 x86_64);产物名见下方 dmg.artifactName。
      # 代价:签名+公证按 3 个独立 .app 各跑一次(正式版公证等待 ×3);构建更久。CI 产物 glob 是 *.dmg,自动兼容。
      arch: [universal, arm64, x64]
  # 裁掉 Chromium 自带的多余 locale.pak(55 个语系→只留这 3 个,省 ~40M)。裁的是浏览器 UI 串
  # (右键菜单/文件对话框),与用户输入/传输的日文法文内容无关(那些走 icudtl.dat+系统字体,均保留)。
  # 版本门槛:electron-builder <26 在 mac 上此选项静默失效(#9774);本项目 26.15.3 已含修复。
  # locale 码按磁盘 .lproj 名写(下划线,如 zh_CN 非 zh-CN),否则匹配不上被误删。三个架构对称裁剪,不破坏 universal 合并。
  electronLanguages: [en, en_GB, zh_CN]
  icon: build/icon.icns       # 应用图标(紫底 + 白色纸飞机,主色 #8a67ab)
  # 加固运行时 + entitlements(签名时生效;Electron/V8 加固运行时必需)。
  # 公证**不写在这里**(见下),避免 CI(无凭据)时误触发公证失败。
  # CI:mac job 用 CSC_IDENTITY_AUTO_DISCOVERY:false → 无签名身份 → electron-builder 跳过签名,
  # 这些字段对未签名构建无副作用。本地 pnpm dist:mac:钥匙串有 Developer ID → 自动签名。
  hardenedRuntime: true                       # 公证前提:启用加固运行时
  gatekeeperAssess: false                      # 打包时不本地跑 Gatekeeper 评估(交给公证)
  entitlements: build/entitlements.mac.plist   # Electron/V8 加固运行时必需
  entitlementsInherit: build/entitlements.mac.plist
  # notarize:公证只在本地 dist:mac:sign 脚本里通过 env 开启(不硬编码,防 CI 误触发)

dmg:
  # ${arch} 必需:多架构时无它会同名互相覆盖(electron-builder 不自动加后缀)。
  # 三产物解析为 -universal / -arm64 / -x64 后缀(dmg 上 x64 保持 x64,不变 x86_64)。
  artifactName: ${productName}-${version}-${arch}.dmg
