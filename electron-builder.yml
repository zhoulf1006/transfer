appId: com.loong.transfer
productName: Transfer

directories:
  output: release/${version}
  buildResources: build

# electron-vite 输出到 out/;fastify 等 dependencies 由 builder 从 node_modules 收集
files:
  - out
  - package.json
asarUnpack:
  - '**/node_modules/fastify/**'

# 局域网直连需要网络权限;无签名(测试用,朋友端会有一次性安全提示)
win:
  target:
    - target: nsis            # 安装版:装到固定目录,启动不再每次解压(portable 每次解压慢,冷启动优化)
      arch: [x64]
  # icon: build/icon.ico       # 未提供图标时用 Electron 默认图标

# NSIS:一键静默安装(体验接近免安装),装到用户目录、不弹安装向导
nsis:
  oneClick: true              # 双击即静默安装并启动,不弹向导
  perMachine: false           # 装到当前用户目录(无需管理员)
  allowToChangeInstallationDirectory: false
  artifactName: ${productName}-${version}-setup.exe

mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch: [arm64]           # 本机 M 芯片;需 Intel 再加 x64
  # icon: build/icon.icns

dmg:
  artifactName: ${productName}-${version}.dmg
